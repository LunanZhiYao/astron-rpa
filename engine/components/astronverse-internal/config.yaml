atomic:
  Internal.wecom_group_message:
    title: 企业微信群消息
    comment: >-
      向机器人地址(@{robot_url})发送文本(@{content})，@某人手机号(@{mentioned_mobile})，响应保存至(@{response_text})
    icon: wecom-robot-message
    helpManual: >-
      向企业微信群机器人 Webhook 发送 text 消息；多个手机号用英文逗号分隔。
    inputList:
      - key: robot_url
        title: 机器人地址
        tip: 企业微信群机器人的 Webhook 地址
      - key: content
        title: 文本内容
        tip: 消息正文
      - key: mentioned_mobile
        title: "@某人（手机号）"
        tip: 需要 @ 的用户手机号，多个用英文逗号分隔，如 15563371738,13800138000
    outputList:
      - key: response_text
        title: 响应内容
        tip: 接口返回的文本结果
  Internal.yunshang_lunan_message:
    title: 云上鲁南消息推送
    comment: >-
      云上鲁南消息推送，接收方(@{receiver_id})，类型(@{msg_type})，响应保存至(@{response_text})
    icon: cloud-lunan-message
    helpManual: >-
      Text 消息填写正文；File 消息填写链接、文件名、文件大小，系统会将文件信息封装到 text 字段。
    inputList:
      - key: receiver_id
        title: 接收方工号
        tip: receiver_id，接收方工号
      - key: msg_type
        title: 消息类型
        tip: Text 为文本消息需填写正文；File 为文件消息需填写链接并在 text 中传文件信息 JSON
      - key: text
        title: 消息内容
        tip: Text 时填写正文；File 时填写 {"fileName":"file_name","fileSize":"file_size"}
      - key: link
        title: 附件链接
        tip: msg_type 为 File 时填写
      - key: file_name
        title: 文件名
        tip: msg_type 为 File 时填写，系统会封装进 text 的 fileName
      - key: file_size
        title: 文件大小
        tip: msg_type 为 File 时填写，系统会封装进 text 的 fileSize
    outputList:
      - key: response_text
        title: 响应内容
        tip: 接口返回的文本结果
  Internal.minio_file_upload:
    title: MinIO文件上传
    comment: >-
      上传文件(@{file_path})到 MinIO，返回文件地址(@{file_url})、文件名(@{file_name})、文件大小(@{file_size})
    icon: cloud-upload
    helpManual: >-
      支持选择本地文件或传入流程变量中的文件路径；object_name 可选，不填则自动生成对象名。
    inputList:
      - key: file_path
        title: 文件路径
        tip: 选择要上传的文件，支持流程变量
      - key: object_name
        title: MinIO对象名
        tip: 可选；例如 folder/demo.txt，不填则后端自动生成
    outputList:
      - key: file_url
        title: 文件URL
        tip: 上传成功后返回可访问地址
      - key: file_name
        title: 文件名
        tip: 上传后的文件名
      - key: file_size
        title: 文件大小
        tip: 上传文件大小（字节）
options: {}
